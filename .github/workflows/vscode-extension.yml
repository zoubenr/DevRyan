name: Publish VS Code Extension

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing tag to attach the VSIX to (e.g., v1.1.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      RELEASE_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.release_tag || github.ref }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.event.inputs.release_tag || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build VS Code extension
        run: bun run --cwd packages/vscode build

      - name: Package extension
        run: cd packages/vscode && bunx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: cd packages/vscode && bunx vsce publish -p "$VSCE_PAT" --no-dependencies

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: bunx ovsx publish packages/vscode/*.vsix -p "$OVSX_PAT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: openchamber-vscode-vsix
          path: packages/vscode/*.vsix

      - name: Verify target release exists
        if: ${{ env.RELEASE_TAG != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "$RELEASE_TAG"

      - name: Attach VSIX to GitHub Release
        if: ${{ env.RELEASE_TAG != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: packages/vscode/*.vsix
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
